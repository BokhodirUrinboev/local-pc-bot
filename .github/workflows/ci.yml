name: CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: musanna-soft/remofy-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout k8s-gitops
        uses: actions/checkout@v4
        with:
          repository: musanna-soft/k8s-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: k8s-gitops

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: ghcr.io/musanna-soft/remofy-bot:.*|image: ghcr.io/musanna-soft/remofy-bot:main-${{ github.sha }}|" \
            k8s-gitops/apps/remofy-bot/deployment.yaml

      - name: Commit and push changes
        run: |
          cd k8s-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/remofy-bot/deployment.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update remofy-bot image to main-${{ github.sha }}"

          # Race condition'dan saqlanish — boshqa job ham k8s-gitops'ga push qilayotgan bo'lishi mumkin
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push failed, attempt $i — retrying..."
            sleep $((i * 2))
          done
          exit 1
